<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Editar Estudiante</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',sans-serif;background:#f5f0e8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;}
  .modal{background:#fff;border-radius:14px;width:520px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.15);}
  .modal-header{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;padding:18px 24px;text-align:center;font-size:17px;font-weight:700;}
  .modal-body{padding:28px;}
  .avatar{width:60px;height:60px;background:#e8a020;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
  .field{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
  .field-label{background:#1d4ed8;color:#fff;padding:7px 10px;border-radius:6px;font-size:12px;white-space:nowrap;min-width:110px;text-align:center;}
  .field input,.field select{flex:1;padding:8px 12px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;}
  .field input:focus,.field select:focus{outline:none;border-color:#1d4ed8;}
  .field input[readonly]{background:#f5f5f5;color:#888;}
  .btn-row{display:flex;gap:12px;margin-top:20px;justify-content:center;}
  .btn-cancel{background:#ccc;color:#444;border:none;padding:10px 22px;border-radius:7px;font-size:14px;cursor:pointer;text-decoration:none;display:inline-block;}
  .btn-update{background:#e8a020;color:#fff;border:none;padding:10px 22px;border-radius:7px;font-size:14px;cursor:pointer;font-weight:600;}
  .btn-update:hover{background:#c88010;}
</style>
</head>
<body>
<div class="modal">
  <div class="modal-header">👨‍🎓 Editar Estudiante</div>
  <div class="modal-body">
    <div class="avatar">👤</div>
    <form action="/coordinador/alumnos/actualizar" method="post">
      <input type="hidden" name="id" th:value="${estudiante.id}"/>
      <div class="field"><span class="field-label">Documento</span><input type="text" th:value="${estudiante.identificacion}" name="identificacion" readonly/></div>
      <div class="field"><span class="field-label">Primer Nombre</span><input type="text" name="primerNombre" th:value="${estudiante.primerNombre}" required/></div>
      <div class="field"><span class="field-label">Segundo Nombre</span><input type="text" name="segundoNombre" th:value="${estudiante.segundoNombre}"/></div>
      <div class="field"><span class="field-label">Primer Apellido</span><input type="text" name="primerApellido" th:value="${estudiante.primerApellido}" required/></div>
      <div class="field"><span class="field-label">Segundo Apellido</span><input type="text" name="segundoApellido" th:value="${estudiante.segundoApellido}"/></div>
      <div class="field"><span class="field-label">Correo</span><input type="email" name="correo" th:value="${estudiante.correo}"/></div>
      <div class="field"><span class="field-label">Teléfono</span><input type="text" name="telefono" th:value="${estudiante.telefono}"/></div>
      <div class="field"><span class="field-label">Nº Registro</span><input type="text" name="numRegistro" th:value="${estudiante.numRegistro}"/></div>
      <div class="field"><span class="field-label">Semestre</span><input type="number" name="semestre" th:value="${estudiante.semestre}"/></div>
      <div class="field"><span class="field-label">Programa</span><input type="text" name="programa" th:value="${estudiante.programa}"/></div>
      <div class="field">
        <span class="field-label">Tipo Programa</span>
        <select name="tipoPrograma">
          <option value="Profesional" th:selected="${estudiante.tipoPrograma == 'Profesional'}">Profesional</option>
          <option value="Tecnología" th:selected="${estudiante.tipoPrograma == 'Tecnología'}">Tecnología</option>
        </select>
      </div>
      <div class="btn-row">
        <a href="/coordinador/alumnos" class="btn-cancel">✕ Cancelar</a>
        <button type="submit" class="btn-update">💾 Actualizar Estudiante</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
